services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - kai-net

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    networks:
      - kai-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      TZ: Europe/Moscow
      GENERIC_TIMEZONE: Europe/Moscow
      N8N_PROXY_HOPS: "1"
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - fastapi
    networks:
      - kai-net

volumes:
  qdrant_data:
  n8n_data:

networks:
  kai-net:
    driver: bridge
